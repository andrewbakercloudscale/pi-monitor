# cloudflared tunnel config
# Place at: /home/pi/.cloudflared/config.yml
#
# Setup steps:
#   1. cloudflared tunnel login
#   2. cloudflared tunnel create pi-monitor
#   3. Copy the tunnel UUID here (replaces <TUNNEL-UUID>)
#   4. cloudflared tunnel route dns pi-monitor api.pi.andrewbaker.ninja
#   5. sudo cp deploy/cloudflared.yml /home/pi/.cloudflared/config.yml
#   6. sudo cloudflared service install
#   7. sudo systemctl enable --now cloudflared

tunnel: <TUNNEL-UUID>
credentials-file: /home/pi/.cloudflared/<TUNNEL-UUID>.json

ingress:
  - hostname: api.pi.andrewbaker.ninja
    service: http://127.0.0.1:8080
  - service: http_status:404
