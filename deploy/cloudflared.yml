# cloudflared tunnel config
# Live config on Pi at: /home/pi/.cloudflared/config.yml
# Credentials file at:  /home/pi/.cloudflared/bbe4f8d6-2e02-488b-a343-a0ad88d6d9e0.json
#
# ── Tunnel details ──────────────────────────────────────────────────────────
#   Tunnel name:  pi-monitor
#   Tunnel UUID:  bbe4f8d6-2e02-488b-a343-a0ad88d6d9e0
#   CF Zone:      andrewbaker.ninja  (zone ID: 8a326892e9e217e292faddd69988b7a0)
#   cloudflared:  v2026.3.0
#
# ── DNS routes ──────────────────────────────────────────────────────────────
#   pi.andrewbaker.ninja       → Pi nginx :3001 (Next.js frontend)
#   api-pi.andrewbaker.ninja   → Pi FastAPI :8080 (API)
#
# ── Cloudflare caching ──────────────────────────────────────────────────────
#   Page rule: pi.andrewbaker.ninja/*  →  cache_level = bypass
#   All requests pass through to the Pi — nothing cached at CF edge.
#
# ── Cloudflare Access (Zero Trust → Access → Applications) ─────────────────
#   App 1 — Frontend (requires Google login):
#     Domain: pi.andrewbaker.ninja
#     Policy: Allow — Google SSO
#
#   App 2 — API /api/* bypass (IMPORTANT):
#     Domain: pi.andrewbaker.ninja/api
#     Policy: Bypass — Everyone
#     Reason: Next.js fetches /api/* via nginx proxy on the same origin.
#             Without this bypass, CF Access blocks those fetch() calls.
#
# ── Service management on Pi ────────────────────────────────────────────────
#   sudo systemctl status cloudflared
#   sudo systemctl restart cloudflared
#   sudo journalctl -u cloudflared -f
#
# ── To reinstall from scratch ───────────────────────────────────────────────
#   cloudflared tunnel login
#   cloudflared tunnel create pi-monitor
#   cloudflared tunnel route dns pi-monitor pi.andrewbaker.ninja
#   cloudflared tunnel route dns pi-monitor api-pi.andrewbaker.ninja
#   sudo cp deploy/cloudflared.yml /home/pi/.cloudflared/config.yml
#   sudo cloudflared service install
#   sudo systemctl enable --now cloudflared

tunnel: bbe4f8d6-2e02-488b-a343-a0ad88d6d9e0
credentials-file: /home/pi/.cloudflared/bbe4f8d6-2e02-488b-a343-a0ad88d6d9e0.json

ingress:
  - hostname: pi.andrewbaker.ninja
    service: http://127.0.0.1:3001
  - hostname: api-pi.andrewbaker.ninja
    service: http://127.0.0.1:8080
  - service: http_status:404
